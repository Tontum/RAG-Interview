spring:
  application:
    name: RAG-Interview
  
  datasource:
    url: jdbc:postgresql://localhost:5432/rag_db
    username: postgres
    password: ${DB_PASSWORD:your_password}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

# Spring AI 配置 (小米大模型)
spring.ai:
  openai:
    api-key: ${AI_API_KEY:tp-cnui0166lsgxj0ihitpf8hibv6ae3823tsvej9l0w0tub7bx}
    base-url: https://token-plan-cn.xiaomimimo.com/v1
    chat:
      options:
        model: mimo-v2.5-pro
    embedding:
      options:
        model: ${EMBEDDING_MODEL:text-embedding-v3}
        dimensions: 1024

# 自定义配置
rag:
  chunk-size: 800
  chunk-overlap: 0
  top-k: 8
  min-score: 0.28

server:
  port: 8080