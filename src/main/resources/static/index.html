<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG 知识库问答系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 20px;
            height: calc(100vh - 40px);
        }
        
        .left-panel {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow-y: auto;
        }
        
        .right-panel {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
        }
        
        h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 8px;
        }
        
        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 24px;
        }
        
        .section {
            margin-bottom: 24px;
        }
        
        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #444;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .section-title::before {
            content: '';
            width: 4px;
            height: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 2px;
        }
        
        .upload-area {
            border: 2px dashed #ddd;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #fafafa;
        }
        
        .upload-area:hover {
            border-color: #667eea;
            background: #f0f0ff;
        }
        
        .upload-area.dragover {
            border-color: #667eea;
            background: #e8e8ff;
        }
        
        .upload-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }
        
        .upload-text {
            color: #666;
            font-size: 14px;
        }
        
        .upload-text span {
            color: #667eea;
            font-weight: 600;
        }
        
        #file-input {
            display: none;
        }
        
        .file-info {
            background: #f5f5f5;
            border-radius: 8px;
            padding: 12px;
            margin-top: 12px;
            display: none;
        }
        
        .file-info.show {
            display: block;
        }
        
        .file-name {
            font-weight: 600;
            color: #333;
            word-break: break-all;
        }
        
        .file-size {
            color: #666;
            font-size: 12px;
            margin-top: 4px;
        }
        
        .input-group {
            margin-bottom: 12px;
        }
        
        .input-group label {
            display: block;
            font-size: 14px;
            color: #555;
            margin-bottom: 6px;
        }
        
        .input-group input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .kb-list {
            max-height: 200px;
            overflow-y: auto;
        }
        
        .kb-item {
            background: #f5f5f5;
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .kb-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #667eea;
        }
        
        .kb-item-info {
            flex: 1;
        }
        
        .kb-item-name {
            font-weight: 500;
            color: #333;
            font-size: 14px;
        }
        
        .kb-item-status {
            font-size: 12px;
            margin-top: 2px;
        }
        
        .status-completed {
            color: #22c55e;
        }
        
        .status-pending {
            color: #f59e0b;
        }
        
        .status-failed {
            color: #ef4444;
        }
        
        .chat-header {
            padding-bottom: 16px;
            border-bottom: 1px solid #eee;
            margin-bottom: 16px;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px 0;
        }
        
        .message {
            margin-bottom: 16px;
            display: flex;
            gap: 12px;
        }
        
        .message-user {
            flex-direction: row-reverse;
        }
        
        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }
        
        .message-user .message-avatar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .message-ai .message-avatar {
            background: #f0f0f0;
        }
        
        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
        }
        
        .message-user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .message-ai .message-content {
            background: #f5f5f5;
            color: #333;
            border-bottom-left-radius: 4px;
        }
        
        .chat-input {
            padding-top: 16px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 12px;
        }
        
        .chat-input input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 24px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }
        
        .chat-input input:focus {
            border-color: #667eea;
        }
        
        .chat-input button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 24px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .chat-input button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .chat-input button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .empty-state {
            text-align: center;
            color: #999;
            padding: 60px 20px;
        }
        
        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #ddd;
            border-radius: 50%;
            border-top-color: #667eea;
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 24px;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            z-index: 1000;
            transform: translateX(120%);
            transition: transform 0.3s ease;
        }
        
        .toast.show {
            transform: translateX(0);
        }
        
        .toast-success {
            background: #22c55e;
        }
        
        .toast-error {
            background: #ef4444;
        }
        
        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
                height: auto;
            }
            
            .left-panel, .right-panel {
                height: auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="left-panel">
            <h1>RAG 知识库</h1>
            <p class="subtitle">上传文档，智能问答</p>
            
            <div class="section">
                <div class="section-title">上传文档</div>
                <div class="upload-area" id="upload-area">
                    <div class="upload-icon">📁</div>
                    <div class="upload-text">
                        拖拽文件到这里，或 <span>点击上传</span>
                    </div>
                    <div class="upload-text" style="margin-top: 8px; font-size: 12px;">
                        支持 PDF、Word、TXT 等格式
                    </div>
                </div>
                <input type="file" id="file-input" accept=".pdf,.doc,.docx,.txt,.md">
                <div class="file-info" id="file-info">
                    <div class="file-name" id="file-name"></div>
                    <div class="file-size" id="file-size"></div>
                </div>
                <div class="input-group" style="margin-top: 12px;">
                    <label>文档名称（可选）</label>
                    <input type="text" id="doc-name" placeholder="自定义文档名称">
                </div>
                <button class="btn btn-primary" id="upload-btn" disabled>上传并处理</button>
            </div>
            
            <div class="section">
                <div class="section-title">知识库列表</div>
                <div class="kb-list" id="kb-list">
                    <div class="empty-state" style="padding: 20px;">
                        <div style="color: #999; font-size: 14px;">暂无文档</div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="right-panel">
            <div class="chat-header">
                <h2 style="font-size: 18px; color: #333;">智能问答</h2>
                <p style="font-size: 13px; color: #666; margin-top: 4px;">选择知识库后开始提问</p>
            </div>
            
            <div class="chat-messages" id="chat-messages">
                <div class="empty-state">
                    <div class="empty-state-icon">💬</div>
                    <div>选择知识库并开始提问</div>
                </div>
            </div>
            
            <div class="chat-input">
                <input type="text" id="question-input" placeholder="输入你的问题..." disabled>
                <button id="send-btn" disabled>发送</button>
            </div>
        </div>
    </div>
    
    <div class="toast" id="toast"></div>
    
    <script>
        // 全局状态
        let knowledgeBases = [];
        let selectedKBIds = [];
        let isProcessing = false;
        
        // DOM 元素
        const uploadArea = document.getElementById('upload-area');
        const fileInput = document.getElementById('file-input');
        const fileInfo = document.getElementById('file-info');
        const fileName = document.getElementById('file-name');
        const fileSize = document.getElementById('file-size');
        const docName = document.getElementById('doc-name');
        const uploadBtn = document.getElementById('upload-btn');
        const kbList = document.getElementById('kb-list');
        const chatMessages = document.getElementById('chat-messages');
        const questionInput = document.getElementById('question-input');
        const sendBtn = document.getElementById('send-btn');
        const toast = document.getElementById('toast');
        
        // 显示提示
        function showToast(message, type = 'success') {
            toast.textContent = message;
            toast.className = `toast toast-${type} show`;
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
        
        // 格式化文件大小
        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }
        
        // 上传区域事件
        uploadArea.addEventListener('click', () => fileInput.click());
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                fileInput.files = e.dataTransfer.files;
                handleFileSelect();
            }
        });
        
        fileInput.addEventListener('change', handleFileSelect);
        
        function handleFileSelect() {
            const file = fileInput.files[0];
            if (file) {
                fileName.textContent = file.name;
                fileSize.textContent = formatSize(file.size);
                fileInfo.classList.add('show');
                uploadBtn.disabled = false;
                docName.value = file.name.replace(/\.[^/.]+$/, '');
            }
        }
        
        // 上传文件
        uploadBtn.addEventListener('click', async () => {
            const file = fileInput.files[0];
            if (!file) return;
            
            const formData = new FormData();
            formData.append('file', file);
            formData.append('name', docName.value || file.name);
            
            uploadBtn.disabled = true;
            uploadBtn.textContent = '处理中...';
            
            try {
                const response = await fetch('/api/knowledgebase/upload', {
                    method: 'POST',
                    body: formData
                });
                
                if (response.ok) {
                    const data = await response.json();
                    // 检查是否是已存在的记录
                    const existingIds = knowledgeBases.map(kb => kb.id);
                    if (existingIds.includes(data.id)) {
                        showToast('文件已存在，返回已有记录');
                    } else {
                        showToast('上传成功！');
                    }
                    loadKnowledgeBases();
                    // 重置
                    fileInput.value = '';
                    fileInfo.classList.remove('show');
                    docName.value = '';
                } else {
                    showToast('上传失败：' + response.statusText, 'error');
                }
            } catch (error) {
                showToast('上传失败：' + error.message, 'error');
            } finally {
                uploadBtn.disabled = false;
                uploadBtn.textContent = '上传并处理';
            }
        });
        
        // 加载知识库列表
        async function loadKnowledgeBases() {
            kbList.innerHTML = '<div style="text-align: center; color: #999; padding: 20px;">加载中...</div>';
            
            try {
                const response = await fetch('/api/knowledgebase/list');
                if (response.ok) {
                    knowledgeBases = await response.json();
                    renderKBList();
                } else {
                    kbList.innerHTML = '<div style="text-align: center; color: #ef4444; padding: 20px;">加载失败</div>';
                }
            } catch (error) {
                kbList.innerHTML = '<div style="text-align: center; color: #ef4444; padding: 20px;">加载失败</div>';
            }
        }
        
        // 渲染知识库列表
        function renderKBList() {
            if (knowledgeBases.length === 0) {
                kbList.innerHTML = `
                    <div style="text-align: center; color: #999; padding: 20px; font-size: 14px;">
                        暂无文档，请上传文件
                    </div>
                `;
                return;
            }
            
            kbList.innerHTML = knowledgeBases.map(kb => `
                <div class="kb-item">
                    <input type="checkbox" 
                           id="kb-${kb.id}" 
                           value="${kb.id}"
                           ${selectedKBIds.includes(kb.id) ? 'checked' : ''}
                           onchange="toggleKB(${kb.id})">
                    <div class="kb-item-info">
                        <div class="kb-item-name">${kb.name}</div>
                        <div class="kb-item-status">
                            <span class="status-${kb.vectorStatus.toLowerCase()}">${getStatusText(kb.vectorStatus)}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        function getStatusText(status) {
            const statusMap = {
                'COMPLETED': '✓ 已就绪',
                'PENDING': '⏳ 处理中',
                'PROCESSING': '⏳ 处理中',
                'FAILED': '✗ 失败'
            };
            return statusMap[status] || status;
        }
        
        // 切换知识库选择
        function toggleKB(id) {
            const index = selectedKBIds.indexOf(id);
            if (index > -1) {
                selectedKBIds.splice(index, 1);
            } else {
                selectedKBIds.push(id);
            }
            updateInputState();
        }
        
        // 更新输入状态
        function updateInputState() {
            const hasSelection = selectedKBIds.length > 0;
            questionInput.disabled = !hasSelection;
            sendBtn.disabled = !hasSelection || !questionInput.value.trim();
        }
        
        questionInput.addEventListener('input', () => {
            sendBtn.disabled = !questionInput.value.trim() || selectedKBIds.length === 0;
        });
        
        questionInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !sendBtn.disabled) {
                sendMessage();
            }
        });
        
        sendBtn.addEventListener('click', sendMessage);
        
        // 发送消息
        async function sendMessage() {
            const question = questionInput.value.trim();
            if (!question || isProcessing) return;
            
            isProcessing = true;
            sendBtn.disabled = true;
            questionInput.value = '';
            
            // 添加用户消息
            addMessage(question, 'user');
            
            // 添加AI消息占位
            const aiMessage = addMessage('', 'ai', true);
            
            try {
                const response = await fetch('/api/rag/query/stream', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        knowledgeBaseIds: selectedKBIds,
                        question: question
                    })
                });
                
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullText = '';
                
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    
                    for (const line of lines) {
                        if (line.startsWith('data:')) {
                            const text = line.substring(5);
                            fullText += text;
                            aiMessage.querySelector('.message-content').textContent = fullText;
                        }
                    }
                    
                    // 滚动到底部
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                }
                
            } catch (error) {
                aiMessage.querySelector('.message-content').textContent = '请求失败：' + error.message;
            } finally {
                isProcessing = false;
                sendBtn.disabled = false;
                questionInput.focus();
            }
        }
        
        // 添加消息
        function addMessage(text, type, isLoading = false) {
            // 清除空状态
            const emptyState = chatMessages.querySelector('.empty-state');
            if (emptyState) {
                emptyState.remove();
            }
            
            const messageDiv = document.createElement('div');
            messageDiv.className = `message message-${type}`;
            messageDiv.innerHTML = `
                <div class="message-avatar">${type === 'user' ? '👤' : '🤖'}</div>
                <div class="message-content">${isLoading ? '<span class="loading"></span>' : text}</div>
            `;
            
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            
            return messageDiv;
        }
        
        // 初始化
        loadKnowledgeBases();
    </script>
</body>
</html>
